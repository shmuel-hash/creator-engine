<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creator Engine — Luma Nutrition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #FAF8F5;
      --bg-card: #FEFDFB;
      --bg-muted: #F5F2ED;
      --bg-inset: #F0EDE7;
      --border: #EAE5DC;
      --border-light: #F0EDE7;
      --text: #3D2E1F;
      --text-secondary: #8A7E6E;
      --text-muted: #B0A798;
      --terracotta: #C45D3E;
      --terracotta-light: #F5EBE6;
      --terracotta-hover: #B5502F;
      --sage: #5E8B6A;
      --sage-light: #E6F0EA;
      --cream: #FAF8F5;
      --peach: #F2DDD0;
      --blue: #4B7DC4;
      --blue-light: #E6EEF8;
      --purple: #7C5DC4;
      --purple-light: #F0EBF8;
      --amber: #C49A3E;
      --amber-light: #FAF3E3;
      --red: #C44B4B;
      --red-light: #FAE6E6;
      --shadow-sm: 0 1px 3px rgba(60,40,20,0.04);
      --shadow-md: 0 4px 16px rgba(60,40,20,0.06);
      --shadow-warm: 0 8px 30px -8px rgba(196,93,62,0.12);
      --radius: 16px;
      --radius-sm: 10px;
      --radius-xs: 6px;
      --font-display: 'Instrument Serif', serif;
      --font-body: 'Plus Jakarta Sans', system-ui, sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }

    #root { min-height: 100vh; }
    input, textarea, select, button { font-family: inherit; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .fade-up { animation: fadeUp 0.4s ease forwards; }

    .card-warm {
      background: var(--bg-card);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      overflow: hidden;
    }
    .card-warm:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-warm);
    }

    .pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 600;
      white-space: nowrap;
    }

    .btn-terracotta {
      background: var(--terracotta); color: #fff; border: none;
      padding: 8px 18px; border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all 0.15s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-terracotta:hover { background: var(--terracotta-hover); }
    .btn-terracotta:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-ghost {
      background: transparent; color: var(--text-secondary); border: 1px solid var(--border);
      padding: 6px 14px; border-radius: var(--radius-sm);
      font-size: 12px; font-weight: 500; cursor: pointer;
      transition: all 0.15s;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-ghost:hover { border-color: var(--terracotta); color: var(--terracotta); background: var(--terracotta-light); }

    /* Backdrop for slide-out panel */
    .backdrop { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.25); backdrop-filter: blur(4px); animation: fadeIn 0.2s ease; }
    .detail-panel {
      position: fixed; right: 0; top: 0; bottom: 0; z-index: 201;
      width: 100%; max-width: 520px; background: var(--bg-card);
      border-left: 1px solid var(--border); box-shadow: -8px 0 40px rgba(0,0,0,0.1);
      animation: slideIn 0.3s cubic-bezier(0.16,1,0.3,1);
      display: flex; flex-direction: column; overflow: hidden;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef, useMemo, createContext, useContext } = React;

    const API = 'https://creator-engine-production.up.railway.app/api';

    async function api(path, opts = {}) {
      const { method = 'GET', body, params } = opts;
      let url = `${API}${path}`;
      if (params) {
        const sp = new URLSearchParams();
        Object.entries(params).forEach(([k, v]) => { if (v != null && v !== '') sp.append(k, v); });
        const qs = sp.toString();
        if (qs) url += `?${qs}`;
      }
      const res = await fetch(url, { method, headers: body ? { 'Content-Type': 'application/json' } : {}, body: body ? JSON.stringify(body) : undefined });
      if (!res.ok) { const err = await res.json().catch(() => ({ detail: res.statusText })); throw new Error(err.detail || 'API error'); }
      return res.json();
    }

    // ─── SVG ICONS ───
    const I = {
      search: (s=16) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>,
      compass: (s=16) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>,
      users: (s=16) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
      upload: (s=16) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>,
      sparkles: (s=16) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>,
      heart: (s=16, fill=false) => <svg width={s} height={s} viewBox="0 0 24 24" fill={fill?"currentColor":"none"} stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>,
      x: (s=16) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>,
      check: (s=14) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>,
      loader: (s=16) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" style={{animation:'spin 1s linear infinite'}}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>,
      zap: (s=14) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
      mail: (s=14) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>,
      star: (s=14) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>,
      ext: (s=12) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14 21 3"/></svg>,
      clipboard: (s=14) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/></svg>,
      award: (s=14) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg>,
      alert: (s=14) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,
      link: (s=12) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>,
      mapPin: (s=14) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>,
      trendUp: (s=14) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>,
      grid: (s=14) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>,
      list: (s=14) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>,
      database: (s=14) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>,
      chevDown: (s=14) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><polyline points="6 9 12 15 18 9"/></svg>,
    };

    // ─── HELPERS ───
    function fmtNum(n) { if (!n && n !== 0) return '—'; if (n >= 1e6) return (n/1e6).toFixed(1)+'M'; if (n >= 1e3) return (n/1e3).toFixed(1)+'K'; return n.toLocaleString(); }

    const PLAT = { tiktok:{a:'TT',c:'#000',l:'TikTok'}, instagram:{a:'IG',c:'#E1306C',l:'Instagram'}, youtube:{a:'YT',c:'#FF0000',l:'YouTube'}, twitter:{a:'X',c:'#1DA1F2',l:'X'}, linkedin:{a:'LI',c:'#0A66C2',l:'LinkedIn'} };

    function Pill({children, color='var(--text-muted)', bg='var(--bg-muted)', style={}}) {
      return <span className="pill" style={{color, background: bg, ...style}}>{children}</span>;
    }

    function Avatar({name, size=40, src}) {
      const initials = (name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
      const [imgError,setImgError] = useState(false);
      if (src && !imgError) {
        return <img src={src} alt={name} onError={()=>setImgError(true)} style={{width:size,height:size,borderRadius:'50%',objectFit:'cover',flexShrink:0,background:'var(--terracotta-light)'}}/>;
      }
      return <div style={{ width:size, height:size, borderRadius:'50%', background:'var(--terracotta-light)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:size*0.35, fontWeight:700, color:'var(--terracotta)', flexShrink:0 }}>{initials}</div>;
    }

    function PlatformPill({platform, handle, url}) {
      const m = PLAT[platform] || {a:(platform||'').slice(0,2).toUpperCase(), c:'var(--text-secondary)', l:platform};
      const inner = <span style={{display:'inline-flex',alignItems:'center',gap:3,fontSize:11,fontFamily:'var(--font-mono)',color:'var(--text-secondary)'}}>
        <span style={{color:m.c,fontWeight:700}}>{m.a}</span>{handle ? `@${handle.replace('@','')}` : m.l}
      </span>;
      if (url) return <a href={url} target="_blank" rel="noopener" style={{textDecoration:'none'}}>{inner}</a>;
      return inner;
    }

    function ScoreRing({score, size=42}) {
      const pct = Math.min(100,Math.max(0,score||0));
      const color = pct>=70?'var(--sage)':pct>=40?'var(--amber)':'var(--text-muted)';
      const r=(size-6)/2, circ=2*Math.PI*r, off=circ*(1-pct/100);
      return <div style={{position:'relative',width:size,height:size,flexShrink:0}}>
        <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--border)" strokeWidth="3"/>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="3" strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round" style={{transition:'stroke-dashoffset 0.6s ease'}}/>
        </svg>
        <span style={{position:'absolute',inset:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:size*0.3,fontWeight:700,fontFamily:'var(--font-mono)',color}}>{Math.round(score)}</span>
      </div>;
    }

    function EmailQuality({email}) {
      if (!email) return null;
      // Filter out fake/placeholder emails
      const lower = email.toLowerCase();
      if (['available','upon request','contact via','dm for','n/a','none','tbd','pending'].some(f => lower.includes(f))) {
        return <span style={{fontSize:12,color:'var(--text-muted)',display:'inline-flex',alignItems:'center',gap:4}}>{I.mail()} No direct email found</span>;
      }
      if (!email.includes('@')) return null;
      const d = email.split('@')[1]?.toLowerCase()||'';
      const gen = ['gmail.com','yahoo.com','hotmail.com','outlook.com','aol.com','icloud.com'].includes(d);
      const agent = d.includes('manager')||d.includes('talent')||d.includes('agency')||email.includes('mgmt')||email.includes('booking');
      let label,pc,pb;
      if (agent) { label='Agent'; pc='var(--purple)'; pb='var(--purple-light)'; }
      else if (!gen) { label='Personal'; pc='var(--sage)'; pb='var(--sage-light)'; }
      else { label='Generic'; pc='var(--text-muted)'; pb='var(--bg-muted)'; }
      return <span style={{display:'inline-flex',alignItems:'center',gap:6,fontSize:12,fontFamily:'var(--font-mono)',color:'var(--text-secondary)'}}>
        {I.mail()} {email} <Pill color={pc} bg={pb} style={{fontSize:10}}>{label}</Pill>
      </span>;
    }

    // ─── DETAIL PANEL (slide-out) ───
    const DetailCtx = createContext({selected:null, setSelected:()=>{}});

    function DetailPanel() {
      const {selected, setSelected} = useContext(DetailCtx);
      if (!selected) return null;
      const c = selected;
      const ai = c.ai_analysis||{};
      const strategy = ai.outreach_strategy;
      const creds = ai.credentials||[];
      const partnerships = ai.past_partnerships||[];
      const platforms = [];
      if (c.tiktok_handle||c.tiktok_url) platforms.push({n:'tiktok',h:c.tiktok_handle,u:c.tiktok_url,f:c.tiktok_followers});
      if (c.instagram_handle||c.instagram_url) platforms.push({n:'instagram',h:c.instagram_handle,u:c.instagram_url,f:c.instagram_followers});
      if (c.youtube_handle||c.youtube_url) platforms.push({n:'youtube',h:c.youtube_handle,u:c.youtube_url,f:c.youtube_subscribers});
      if (c.twitter_handle||c.twitter_url) platforms.push({n:'twitter',h:c.twitter_handle,u:c.twitter_url,f:c.twitter_followers});
      if (platforms.length===0 && (c.handle||c.profile_url)) platforms.push({n:c.platform||'unknown',h:c.handle,u:c.profile_url,f:c.followers});

      const [copied,setCopied] = useState(null);
      const copy = (text,k) => { navigator.clipboard.writeText(text); setCopied(k); setTimeout(()=>setCopied(null),2000); };

      return <>
        <div className="backdrop" onClick={()=>setSelected(null)}/>
        <div className="detail-panel">
          {/* Cover area */}
          <div style={{position:'relative',height:140,background:'linear-gradient(135deg, var(--terracotta-light) 0%, var(--peach) 50%, var(--sage-light) 100%)',flexShrink:0}}>
            <button onClick={()=>setSelected(null)} style={{position:'absolute',top:12,right:12,width:32,height:32,borderRadius:'50%',background:'rgba(255,255,255,0.8)',backdropFilter:'blur(8px)',border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text)'}}>{I.x()}</button>
            <div style={{position:'absolute',bottom:-28,left:24}}>
              <div style={{border:'4px solid var(--bg-card)',borderRadius:'50%'}}><Avatar name={c.name} size={64} src={ai.avatar_url || ai.apify_profile?.avatar_url}/></div>
            </div>
          </div>

          {/* Content */}
          <div style={{flex:1,overflow:'auto',padding:'40px 24px 24px'}}>
            {/* Name + actions */}
            <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:12}}>
              <div>
                <h2 style={{fontFamily:'var(--font-display)',fontSize:26,color:'var(--text)',margin:0}}>{c.name}</h2>
                {platforms[0]?.h && <div style={{fontSize:13,color:'var(--text-secondary)',marginTop:2}}>@{platforms[0].h.replace('@','')}</div>}
              </div>
              {c.relevance_score!=null && <ScoreRing score={c.relevance_score} size={48}/>}
            </div>

            {/* Tags row */}
            <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:16}}>
              {ai.creator_type && <Pill color="var(--terracotta)" bg="var(--terracotta-light)" style={{fontWeight:700}}>{ai.creator_type}</Pill>}
              {ai.country && <Pill color="var(--text-secondary)" bg="var(--bg-muted)">{I.mapPin()} {ai.country}</Pill>}
              {c.pipeline_stage && <Pill color="var(--text-secondary)" bg="var(--bg-muted)">{c.pipeline_stage}</Pill>}
              {c.quality_tier && <Pill color="var(--sage)" bg="var(--sage-light)">{c.quality_tier}</Pill>}
              {creds.map((cr,i)=><Pill key={i} color="var(--blue)" bg="var(--blue-light)">{I.award()} {cr}</Pill>)}
            </div>
            {/* Content niches */}
            {((ai.content_niches||[]).length > 0 || (c.categories||[]).length > 0) && (
              <div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:12}}>
                {(ai.content_niches||[]).map(n=><Pill key={n} color="var(--sage)" bg="var(--sage-light)">{n}</Pill>)}
                {!ai.content_niches?.length && c.categories?.slice(0,4).map(cat=><Pill key={cat}>{cat}</Pill>)}
              </div>
            )}

            {/* Email */}
            {c.email && <div style={{marginBottom:12}}><EmailQuality email={c.email}/></div>}

            {/* Bio */}
            {c.bio && <p style={{fontSize:13,color:'var(--text-secondary)',lineHeight:1.7,marginBottom:16}}>{c.bio}</p>}

            {/* Stats grid */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:20}}>
              {platforms.map((p,i)=>(
                <div key={i} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4,padding:'12px 8px',background:'var(--bg-muted)',borderRadius:'var(--radius-sm)'}}>
                  <span style={{color:PLAT[p.n]?.c||'var(--text-secondary)',fontWeight:700,fontSize:12}}>{PLAT[p.n]?.a||p.n.slice(0,2).toUpperCase()}</span>
                  <span style={{fontSize:14,fontWeight:700}}>{fmtNum(p.f)}</span>
                  <span style={{fontSize:10,color:'var(--text-muted)'}}>followers</span>
                </div>
              ))}
              {c.engagement_rate && <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4,padding:'12px 8px',background:'var(--bg-muted)',borderRadius:'var(--radius-sm)'}}>

                <span style={{fontSize:14,fontWeight:700}}>{c.engagement_rate}%</span>
                <span style={{fontSize:10,color:'var(--text-muted)'}}>engagement</span>

            {/* Platforms links */}
            <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:16}}>

                <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',color:'var(--text-muted)',marginBottom:8}}>{I.zap()} AI Analysis</div>
                {ai.content_fit && <p style={{fontSize:12,color:'var(--text-secondary)',lineHeight:1.6,marginBottom:8}}>{ai.content_fit}</p>}
                {partnerships.length>0 && <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:8}}><span style={{fontSize:11,color:'var(--text-muted)'}}>Partnerships:</span>{partnerships.map((p,i)=><Pill key={i} color="var(--purple)" bg="var(--purple-light)">{p}</Pill>)}</div>}
                {ai.red_flags?.length>0 && <div style={{display:'flex',gap:6,flexWrap:'wrap'}}><span style={{fontSize:11,color:'var(--red)'}}>{I.alert()} Flags:</span>{ai.red_flags.map((f,i)=><Pill key={i} color="var(--red)" bg="var(--red-light)">{f}</Pill>)}</div>}
              </div>
            )}

            {/* Strategy */}
            {strategy && (
              <div style={{borderTop:'1px solid var(--border)',paddingTop:16}}>
                <div style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',color:'var(--text-muted)',marginBottom:12}}>Outreach Strategy</div>
                <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:12}}>
                  {strategy.recommended_product && <Pill color="var(--terracotta)" bg="var(--terracotta-light)">{strategy.recommended_product}</Pill>}
                  {strategy.brand_fit_score && <Pill color="var(--sage)" bg="var(--sage-light)">{I.star()} Fit: {strategy.brand_fit_score}/10</Pill>}
                  {strategy.estimated_rate_range && <Pill>{strategy.estimated_rate_range}</Pill>}
                </div>
                {strategy.creator_summary && <p style={{fontSize:13,color:'var(--text-secondary)',lineHeight:1.7,marginBottom:12}}>{strategy.creator_summary}</p>}
                {strategy.outreach_angle && <div style={{marginBottom:12}}><div style={{fontSize:11,fontWeight:600,color:'var(--text-muted)',marginBottom:4}}>Outreach Angle</div><p style={{fontSize:12,color:'var(--text-secondary)',lineHeight:1.6}}>{strategy.outreach_angle}</p></div>}
                {strategy.personalization_hooks?.length>0 && <div style={{marginBottom:12}}><div style={{fontSize:11,fontWeight:600,color:'var(--text-muted)',marginBottom:4}}>Personalization</div><ul style={{paddingLeft:16,margin:0,fontSize:12,color:'var(--text-secondary)',lineHeight:1.7}}>{strategy.personalization_hooks.map((h,i)=><li key={i}>{h}</li>)}</ul></div>}
                {strategy.content_ideas?.length>0 && <div style={{marginBottom:12}}><div style={{fontSize:11,fontWeight:600,color:'var(--text-muted)',marginBottom:4}}>Content Ideas</div><ul style={{paddingLeft:16,margin:0,fontSize:12,color:'var(--text-secondary)',lineHeight:1.7}}>{strategy.content_ideas.map((c,i)=><li key={i}>{c}</li>)}</ul></div>}
                {strategy.suggested_email_body && <div style={{marginBottom:12}}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
                    <span style={{fontSize:11,fontWeight:600,color:'var(--text-muted)'}}>{I.mail()} Draft Email</span>
                    <button onClick={()=>copy(`Subject: ${strategy.suggested_subject_line}\n\n${strategy.suggested_email_body}`,'email')} className="btn-ghost" style={{padding:'3px 8px',fontSize:10}}>{copied==='email'?I.check():I.clipboard()} {copied==='email'?'Copied':'Copy'}</button>
                  </div>
                  <div style={{padding:12,background:'var(--bg)',borderRadius:'var(--radius-xs)',border:'1px solid var(--border)',fontSize:12,fontFamily:'var(--font-mono)',lineHeight:1.7,color:'var(--text-secondary)',whiteSpace:'pre-wrap'}}>
                    <div style={{fontWeight:600,color:'var(--text)',marginBottom:6}}>Subject: {strategy.suggested_subject_line}</div>
                    {strategy.suggested_email_body}
                  </div>
                </div>}
              </div>
            )}
          </div>
        </div>
      </>;
    }

    // ─── ENRICHMENT PROGRESS ───
    function EnrichmentProgress({creatorId, onComplete}) {
      const [status,setStatus] = useState(null);
      const ref = useRef(null);
      useEffect(()=>{
        if (!creatorId) return;
        const poll = async()=>{ try { const s=await api(`/creators/${creatorId}/enrich/status`); setStatus(s); if (s.status==='complete'||s.status==='failed') { clearInterval(ref.current); if (s.status==='complete'&&onComplete) onComplete(creatorId); } } catch(e){} };
        poll(); ref.current=setInterval(poll,2000);
        return ()=>clearInterval(ref.current);
      },[creatorId]);
      if (!status||status.status==='not_started') return null;
      const pct = status.status==='complete'?100:((status.step||0)/(status.total_steps||3))*100;
      const running = !['complete','failed','not_started'].includes(status.status);
      return <div style={{padding:'10px 14px',background:'var(--terracotta-light)',borderRadius:'var(--radius-xs)',marginBottom:10}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:6}}>
          <span style={{fontSize:12,fontWeight:500,display:'flex',alignItems:'center',gap:6}}>{running&&I.loader()}{status.status==='complete'&&<span style={{color:'var(--sage)'}}>{I.check()}</span>}{status.status==='failed'&&<span style={{color:'var(--red)'}}>{I.x()}</span>}{status.step_label||status.status}</span>
          <span style={{fontSize:11,fontFamily:'var(--font-mono)',color:'var(--text-muted)'}}>{status.step}/{status.total_steps}</span>
        </div>
        <div style={{height:3,background:'var(--border)',borderRadius:2,overflow:'hidden'}}><div style={{height:'100%',background:status.status==='failed'?'var(--red)':'var(--terracotta)',borderRadius:2,width:`${pct}%`,transition:'width 0.5s ease'}}/></div>
        {status.error&&<div style={{fontSize:11,color:'var(--red)',marginTop:4}}>{status.error}</div>}
      </div>;
    }

    // ─── CREATOR CARD (grid) ───
    function CreatorCard({creator, isDiscoveryResult, isDuplicate, onSaveAndEnrich, onEnrich, onSelect, delay=0}) {
      const [enrichCId,setEnrichCId] = useState(null);
      const [enrichDone,setEnrichDone] = useState(false);
      const [local,setLocal] = useState(creator);
      const [err,setErr] = useState(null);
      const c = local;
      const ai = c.ai_analysis||{};
      const creds = ai.credentials||[];
      const strategy = ai.outreach_strategy;

      const platforms=[];
      if (c.tiktok_handle||c.tiktok_url) platforms.push({n:'tiktok',h:c.tiktok_handle,f:c.tiktok_followers});
      if (c.instagram_handle||c.instagram_url) platforms.push({n:'instagram',h:c.instagram_handle,f:c.instagram_followers});
      if (c.youtube_handle||c.youtube_url) platforms.push({n:'youtube',h:c.youtube_handle,f:c.youtube_subscribers});
      if (platforms.length===0&&(c.handle||c.profile_url)) platforms.push({n:c.platform||'unknown',h:c.handle,f:c.followers});

      const doEnrich = async(e)=>{
        e.stopPropagation(); setErr(null);
        try {
          if (isDiscoveryResult&&onSaveAndEnrich) { const saved=await onSaveAndEnrich(c); setLocal(p=>({...p,...saved.creator,_saved:true})); setEnrichCId(saved.creator.id); }
          else if (onEnrich) { await onEnrich(c.id); setEnrichCId(c.id); }
        } catch(e){ setErr(e.message); }
      };
      const onEnrichDone = async(id)=>{ try { const u=await api(`/creators/${id}`); setLocal(u); setEnrichDone(true); } catch(e){} setEnrichCId(null); };

      return <div className="card-warm" style={{opacity:isDuplicate?0.5:1,animationDelay:`${delay*40}ms`}} onClick={()=>onSelect&&onSelect(c)}>
        {/* Cover gradient */}
        <div style={{height:80,background:isDuplicate?'var(--bg-muted)':`linear-gradient(135deg, var(--terracotta-light) 0%, var(--peach) 60%, var(--sage-light) 100%)`,position:'relative'}}>
          {c.relevance_score!=null && <div style={{position:'absolute',top:8,right:8}}><ScoreRing score={c.relevance_score} size={36}/></div>}
          {isDuplicate && <div style={{position:'absolute',top:8,left:8}}><Pill color="var(--amber)" bg="var(--amber-light)">{I.database()} In DB</Pill></div>}
        </div>

        <div style={{padding:'0 16px 16px',cursor:'pointer'}}>
          {/* Avatar overlapping cover */}
          <div style={{display:'flex',alignItems:'flex-end',gap:10,marginTop:-20,marginBottom:10}}>
            <div style={{border:'3px solid var(--bg-card)',borderRadius:'50%'}}><Avatar name={c.name} size={44} src={ai.avatar_url || ai.apify_profile?.avatar_url}/></div>
            <div style={{flex:1,minWidth:0,paddingBottom:2}}>
              <div style={{fontWeight:600,fontSize:14,color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{c.name}</div>
              {platforms[0]?.h && (()=>{
                const handle=platforms[0].h.replace('@','');
                const pUrl=platforms[0].u || (platforms[0].n==='tiktok'?`https://www.tiktok.com/@${handle}`:platforms[0].n==='instagram'?`https://www.instagram.com/${handle}/`:platforms[0].n==='youtube'?`https://www.youtube.com/@${handle}`:null);
                return pUrl ? <a href={pUrl} target="_blank" rel="noopener" onClick={e=>e.stopPropagation()} style={{fontSize:11,color:'var(--terracotta)',fontFamily:'var(--font-mono)',textDecoration:'none'}}>@{handle} {I.ext()}</a>
                  : <div style={{fontSize:11,color:'var(--text-muted)',fontFamily:'var(--font-mono)'}}>@{handle}</div>;
              })()}
            </div>
          </div>

          {/* Type + Credentials + Niches */}
          <div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:8}}>
            {ai.creator_type && <Pill color="var(--terracotta)" bg="var(--terracotta-light)" style={{fontSize:10,fontWeight:700}}>{ai.creator_type}</Pill>}
            {creds.slice(0,2).map((cr,i)=><Pill key={i} color="var(--blue)" bg="var(--blue-light)" style={{fontSize:10}}>{cr}</Pill>)}
            {(ai.content_niches||[]).slice(0,2).map(n=><Pill key={n} color="var(--sage)" bg="var(--sage-light)" style={{fontSize:10}}>{n}</Pill>)}
            {!ai.creator_type && c.categories?.slice(0,2).map(cat=><Pill key={cat} style={{fontSize:10}}>{cat}</Pill>)}
            {ai.country && <Pill style={{fontSize:10}}>{ai.country}</Pill>}
            {!platforms.length && !c.handle && <Pill color="var(--red)" bg="var(--red-light)" style={{fontSize:10}}>{I.alert()} No social</Pill>}
          </div>

          {/* Stats row */}
          <div style={{display:'grid',gridTemplateColumns:`repeat(${Math.min(platforms.length+1,3)},1fr)`,gap:6,paddingTop:10,borderTop:'1px solid var(--border-light)'}}>
            {platforms.slice(0,2).map((p,i)=>(
              <div key={i} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
                <div style={{display:'flex',alignItems:'center',gap:3}}>
                  <span style={{color:PLAT[p.n]?.c,fontWeight:700,fontSize:10}}>{PLAT[p.n]?.a||'?'}</span>
                  <span style={{fontSize:12,fontWeight:700}}>{fmtNum(p.f)}</span>
                </div>
                <span style={{fontSize:9,color:'var(--text-muted)'}}>followers</span>
              </div>
            ))}
            {c.engagement_rate && <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
              <span style={{fontSize:12,fontWeight:700}}>{c.engagement_rate}%</span>
              <span style={{fontSize:9,color:'var(--text-muted)'}}>engage</span>
            </div>}
          </div>

          {/* Enrich button or enriched state */}
          {!enrichCId && !enrichDone && !isDuplicate && !c._enriched && !c._enrichingCreatorId && (
            <div style={{marginTop:10}}>
              <button className="btn-terracotta" onClick={doEnrich} style={{width:'100%',justifyContent:'center',fontSize:12,padding:'7px 12px'}}>
                {I.zap()} {isDiscoveryResult&&!c._saved?'Save & Find Contact':'Find Contact'}
              </button>
              {err&&<div style={{fontSize:11,color:'var(--red)',marginTop:4}}>{err}</div>}
            </div>
          )}
          {(c._enrichingCreatorId && !c._enriched && !enrichDone) && (
            <div style={{marginTop:8}}><EnrichmentProgress creatorId={c._enrichingCreatorId} onComplete={onEnrichDone}/></div>
          )}
          {(enrichDone || c._enriched) && (
            <div style={{marginTop:10,padding:'10px 12px',background:'var(--sage-light)',borderRadius:'var(--radius-xs)',border:'1px solid var(--sage)'}}>
              <div style={{fontSize:11,fontWeight:600,color:'var(--sage)',marginBottom:6,display:'flex',alignItems:'center',gap:4}}>{I.check()} Enriched</div>
              {(c.email||local.email) && <div style={{fontSize:11,fontFamily:'var(--font-mono)',color:'var(--text-secondary)',marginBottom:4}}>{I.mail()} {c.email||local.email}</div>}
              {(c.total_followers||local.total_followers) && <div style={{fontSize:11,color:'var(--text-secondary)',marginBottom:4}}>{fmtNum(c.total_followers||local.total_followers)} followers</div>}
              {(c.bio||local.bio) && <div style={{fontSize:11,color:'var(--text-muted)',lineHeight:1.5,maxHeight:40,overflow:'hidden'}}>{c.bio||local.bio}</div>}
              <button onClick={(e)=>{e.stopPropagation();onSelect&&onSelect({...c,...local});}} style={{marginTop:6,background:'none',border:'none',cursor:'pointer',fontSize:11,color:'var(--terracotta)',fontWeight:600,padding:0}}>View full profile →</button>
            </div>
          )}
          {enrichCId && !c._enrichingCreatorId && <div style={{marginTop:8}}><EnrichmentProgress creatorId={enrichCId} onComplete={onEnrichDone}/></div>}
        </div>
      </div>;
    }

    // ─── FILTER CONSTANTS ───
    const CREATOR_TYPES = ['Doctor/Medical','UGC Creator','Health Influencer','Fitness Creator','Mom/Parenting','Wellness/Lifestyle','Nutritionist/Dietitian','Podcaster'];
    const CONTENT_NICHES = ['Heart Health','Gut Health','Longevity','Supplements','Nutrition','Fitness','General Wellness','Weight Loss','Mental Health','Biohacking',"Women's Health","Men's Health"];

    // ─── DISCOVER TAB ───
    function DiscoverTab() {
      const {setSelected} = useContext(DetailCtx);
      const [query,setQuery]=useState(''); const [searching,setSearching]=useState(false);
      const [searchStatus,setSearchStatus]=useState(null); const [results,setResults]=useState(null);
      const [error,setError]=useState(null); const [resultCount,setResultCount]=useState(20);
      const [existing,setExisting]=useState([]); const [viewMode,setViewMode]=useState('grid');
      const [typeFilter,setTypeFilter]=useState(''); const [nicheFilter,setNicheFilter]=useState('');
      const [batchEnriching,setBatchEnriching]=useState(false);
      const [savedThisSession,setSavedThisSession]=useState(new Set()); // discovery result IDs saved this session
      const pollRef=useRef(null);
      const batchPollRef=useRef(null);

      useEffect(()=>{ api('/creators',{params:{per_page:500}}).then(d=>setExisting(d.creators||[])).catch(()=>{}); },[]);
      const dedupSet=useMemo(()=>{ const s=new Set(); existing.forEach(c=>{ if(c.name)s.add(c.name.toLowerCase().trim()); if(c.email)s.add(c.email.toLowerCase().trim()); ['tiktok_handle','instagram_handle','youtube_handle','twitter_handle'].forEach(k=>{if(c[k])s.add(c[k].toLowerCase().replace('@','').trim());}); }); return s; },[existing]);
      const checkDup=(r)=>{ if(savedThisSession.has(r.id)||r._saved)return false; if(r.name&&dedupSet.has(r.name.toLowerCase().trim()))return true; if(r.email&&dedupSet.has(r.email.toLowerCase().trim()))return true; const h=(r.handle||'').toLowerCase().replace('@','').trim(); return h&&dedupSet.has(h); };

      const presets=[
        {l:'Doctor TikTok',q:'doctors who talk about heart health on TikTok'},
        {l:'Gen Z Wellness',q:'Gen Z wellness creators on Instagram and TikTok'},
        {l:'Gut Health',q:'gut health nutrition creators with 50k-500k followers'},
        {l:'Mom Creators',q:'mom health and fitness influencers on Instagram'},
        {l:'UGC Health',q:'UGC creators specializing in health supplements'},
        {l:'Longevity',q:'longevity biohacking creators on YouTube'},
      ];
      const statusLabels={starting:'Starting search...',parsing_intent:'Understanding your query...',searching:'Searching across platforms...',analyzing:'Analyzing and scoring creators...',complete:'Complete',failed:'Failed'};

      const doSearch=async(q)=>{ if(!q.trim())return; setSearching(true);setError(null);setResults(null);setSearchStatus(null);clearInterval(pollRef.current);
        try { const d=await api('/discover',{method:'POST',body:{query:q,platforms:['tiktok','instagram','youtube'],max_results:resultCount}}); setSearchStatus({status:'starting'});
          pollRef.current=setInterval(async()=>{ try { const st=await api(`/discover/${d.search_id}`); setSearchStatus(st);
            if(st.status==='complete'){clearInterval(pollRef.current);setResults(st);setSearching(false);api('/creators',{params:{per_page:500}}).then(d=>setExisting(d.creators||[])).catch(()=>{});}
            else if(st.status==='failed'){clearInterval(pollRef.current);setError(st.error||'Search failed');setSearching(false);} }catch(e){}},3000);
        }catch(e){setError(e.message);setSearching(false);}};
      useEffect(()=>()=>{clearInterval(pollRef.current);clearInterval(batchPollRef.current);},[]);

      const handleSAE=async(result)=>{ const saved=await api(`/discover/results/${result.id}/save-and-enrich`,{method:'POST'}); setSavedThisSession(prev=>new Set([...prev,result.id])); setResults(p=>p?{...p,results:p.results.map(r=>r.id===result.id?{...r,_saved:true,_enrichingCreatorId:saved.creator.id}:r)}:p); if(saved.creator)setExisting(p=>[...p,saved.creator]); return saved; };

      const handleSaveAll=async()=>{
        if(!results?.search_id)return; setBatchEnriching(true);
        try {
          const resp=await api(`/discover/${results.search_id}/save-and-enrich-all`,{method:'POST'});
          if(resp.creators?.length){
            const cids=resp.creators.map(c=>c.id);
            const drIds=resp.creators.map(c=>c.discovery_result_id);
            // Track all as saved this session
            setSavedThisSession(prev=>new Set([...prev,...drIds]));
            // Mark all as saved with enriching creator IDs
            setResults(p=>p?{...p,results:p.results.map(r=>{const match=resp.creators.find(c=>c.discovery_result_id===r.id);return match?{...r,_saved:true,_enrichingCreatorId:match.id}:r;})}:p);
            // Poll enrichments — when each completes, fetch full creator data and update the result
            batchPollRef.current=setInterval(async()=>{
              let pending=0;
              for(const cr of resp.creators){
                try{
                  const s=await api(`/creators/${cr.id}/enrich/status`);
                  if(s.status==='complete'){
                    // Fetch enriched creator and merge into results
                    try{
                      const full=await api(`/creators/${cr.id}`);
                      setResults(p=>p?{...p,results:p.results.map(r=>r.id===cr.discovery_result_id?{...r,...full,_saved:true,_enriched:true,id:r.id}:r)}:p);
                    }catch(e){}
                  } else if(s.status!=='failed') pending++;
                }catch(e){}
              }
              if(pending===0){clearInterval(batchPollRef.current);setBatchEnriching(false);}
            },4000);
          } else { setBatchEnriching(false); }
        }catch(e){console.error(e);setBatchEnriching(false);}
      };

      const sorted=useMemo(()=>{ if(!results?.results)return[];
        let t=results.results.map(r=>({...r,_isDup:checkDup(r)}));
        // Apply type filter
        if (typeFilter) t = t.filter(r => (r.ai_analysis?.creator_type||'') === typeFilter || (r.categories||[]).some(c=>c.toLowerCase().includes(typeFilter.toLowerCase())));
        // Apply niche filter
        if (nicheFilter) t = t.filter(r => (r.ai_analysis?.content_niches||[]).includes(nicheFilter) || (r.categories||[]).some(c=>c.toLowerCase().includes(nicheFilter.toLowerCase())));
        return t.sort((a,b)=>a._isDup!==b._isDup?(a._isDup?1:-1):(b.relevance_score||0)-(a.relevance_score||0));
      },[results,dedupSet,typeFilter,nicheFilter,savedThisSession]);
      const newC=sorted.filter(r=>!r._isDup).length, dupC=sorted.filter(r=>r._isDup).length;

      return <div>
        {/* Hero */}
        <div style={{position:'relative',overflow:'hidden',marginBottom:0}}>
          <div style={{background:'linear-gradient(135deg, var(--cream) 0%, var(--peach) 40%, var(--terracotta-light) 100%)',padding:'48px 0 40px'}}>
            <div style={{maxWidth:1200,margin:'0 auto',padding:'0 24px'}}>
              <div style={{maxWidth:540}}>
                <h1 style={{fontFamily:'var(--font-display)',fontSize:42,color:'var(--text)',marginBottom:8,lineHeight:1.15}}>Find Your Perfect Creator</h1>
                <p style={{color:'var(--text-secondary)',fontSize:15,lineHeight:1.6,marginBottom:20}}>Discover doctors, wellness creators, and UGC talent. AI finds, scores, and writes your outreach.</p>

                {/* Search bar */}
                <div style={{display:'flex',gap:8,background:'var(--bg-card)',border:'1px solid var(--border)',borderRadius:'var(--radius)',padding:'4px 4px 4px 16px',alignItems:'center',boxShadow:'var(--shadow-md)',maxWidth:500}}>
                  <span style={{color:'var(--text-muted)',flexShrink:0}}>{I.search()}</span>
                  <input value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doSearch(query)}
                    placeholder="Search creators, niches, platforms..."
                    style={{flex:1,border:'none',outline:'none',background:'transparent',fontSize:14,color:'var(--text)',padding:'10px 0',fontFamily:'var(--font-body)'}}/>
                  {query&&<button onClick={()=>setQuery('')} style={{background:'none',border:'none',cursor:'pointer',color:'var(--text-muted)',display:'flex'}}>{I.x()}</button>}
                  <select value={resultCount} onChange={e=>setResultCount(Number(e.target.value))} style={{padding:'6px 8px',background:'var(--bg-muted)',border:'1px solid var(--border-light)',borderRadius:'var(--radius-xs)',fontSize:12,fontFamily:'var(--font-mono)',color:'var(--text-secondary)',cursor:'pointer'}}>
                    <option value={10}>10</option><option value={20}>20</option><option value={50}>50</option><option value={100}>100</option>
                  </select>
                  <button onClick={()=>doSearch(query)} disabled={searching||!query.trim()} className="btn-terracotta" style={{borderRadius:'var(--radius-sm)'}}>
                    {searching?I.loader():I.sparkles()} {searching?'Searching...':'Discover'}
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div style={{maxWidth:1200,margin:'0 auto',padding:'0 24px'}}>
          {/* Presets */}
          <div style={{display:'flex',gap:6,flexWrap:'wrap',padding:'16px 0 8px'}}>
            {presets.map(p=><button key={p.l} className="btn-ghost" onClick={()=>{setQuery(p.q);doSearch(p.q);}} style={{borderRadius:20,fontSize:12}}>{p.l}</button>)}
          </div>

          {error&&<div style={{padding:'12px 16px',background:'var(--red-light)',borderRadius:'var(--radius-xs)',color:'var(--red)',fontSize:13,marginBottom:16,marginTop:8}}>{error}</div>}

          {/* Progress */}
          {searching&&searchStatus&&<div className="card-warm fade-up" style={{padding:'20px 24px',marginTop:12,marginBottom:16}}>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>{I.loader()}<span style={{fontSize:14,fontWeight:500}}>{statusLabels[searchStatus.status]||searchStatus.status}</span></div>
            <div style={{height:3,background:'var(--border)',borderRadius:2,overflow:'hidden'}}><div style={{height:'100%',background:'var(--terracotta)',borderRadius:2,transition:'width 0.8s ease',width:searchStatus.status==='parsing_intent'?'25%':searchStatus.status==='searching'?'55%':searchStatus.status==='analyzing'?'85%':'10%'}}/></div>
            <div style={{fontSize:11,fontFamily:'var(--font-mono)',color:'var(--text-muted)',marginTop:6}}>Usually takes 1-2 minutes.</div>
          </div>}

          {/* Results */}
          {results&&<div style={{paddingTop:8,paddingBottom:32}}>
            {/* Toolbar */}
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16,flexWrap:'wrap',gap:8}}>
              <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                <span style={{fontSize:14,fontWeight:600}}>{sorted.length} creators</span>
                {newC>0&&<Pill color="var(--sage)" bg="var(--sage-light)">{newC} new</Pill>}
                {dupC>0&&<Pill color="var(--amber)" bg="var(--amber-light)">{dupC} in DB</Pill>}
                <select value={typeFilter} onChange={e=>setTypeFilter(e.target.value)} style={{padding:'6px 10px',border:'1px solid var(--border)',borderRadius:'var(--radius-xs)',fontSize:12,background:'var(--bg-card)',color:typeFilter?'var(--terracotta)':'var(--text-secondary)',cursor:'pointer',fontFamily:'var(--font-body)'}}>
                  <option value="">All Types</option>
                  {CREATOR_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
                </select>
                <select value={nicheFilter} onChange={e=>setNicheFilter(e.target.value)} style={{padding:'6px 10px',border:'1px solid var(--border)',borderRadius:'var(--radius-xs)',fontSize:12,background:'var(--bg-card)',color:nicheFilter?'var(--terracotta)':'var(--text-secondary)',cursor:'pointer',fontFamily:'var(--font-body)'}}>
                  <option value="">All Niches</option>
                  {CONTENT_NICHES.map(n=><option key={n} value={n}>{n}</option>)}
                </select>
                {(typeFilter||nicheFilter)&&<button onClick={()=>{setTypeFilter('');setNicheFilter('');}} style={{background:'none',border:'none',cursor:'pointer',color:'var(--terracotta)',fontSize:12,fontWeight:500}}>Clear</button>}
                {newC>0&&!batchEnriching&&<button className="btn-terracotta" onClick={handleSaveAll} style={{fontSize:12,padding:'6px 14px'}}>{I.zap()} Save & Enrich All ({newC})</button>}
                {batchEnriching&&<span style={{fontSize:12,color:'var(--terracotta)',display:'flex',alignItems:'center',gap:6}}>{I.loader()} Enriching all...</span>}
              </div>
              <div style={{display:'flex',alignItems:'center',gap:4,background:'var(--bg-muted)',borderRadius:'var(--radius-xs)',padding:3}}>
                <button onClick={()=>setViewMode('grid')} style={{padding:6,borderRadius:4,border:'none',cursor:'pointer',background:viewMode==='grid'?'var(--bg-card)':'transparent',color:viewMode==='grid'?'var(--text)':'var(--text-muted)',display:'flex',boxShadow:viewMode==='grid'?'var(--shadow-sm)':'none'}}>{I.grid()}</button>
                <button onClick={()=>setViewMode('list')} style={{padding:6,borderRadius:4,border:'none',cursor:'pointer',background:viewMode==='list'?'var(--bg-card)':'transparent',color:viewMode==='list'?'var(--text)':'var(--text-muted)',display:'flex',boxShadow:viewMode==='list'?'var(--shadow-sm)':'none'}}>{I.list()}</button>
              </div>
            </div>

            {viewMode==='grid'?
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:16}}>
                {sorted.map((r,i)=><CreatorCard key={r.id||i} creator={{...r,categories:r.categories||[]}} isDiscoveryResult={!r._saved} isDuplicate={r._isDup} onSaveAndEnrich={handleSAE} onSelect={setSelected} delay={i}/>)}
              </div>
            :
              <div style={{display:'flex',flexDirection:'column',gap:6}}>
                {sorted.map((r,i)=><ListItem key={r.id||i} creator={r} isDuplicate={r._isDup} onSelect={setSelected} isDiscoveryResult={!r._saved} onSaveAndEnrich={handleSAE}/>)}
              </div>
            }
          </div>}

          {!results&&!searching&&<div style={{textAlign:'center',padding:'80px 20px'}}>
            <div style={{marginBottom:16,opacity:0.25}}>{I.compass(48)}</div>
            <div style={{fontFamily:'var(--font-display)',fontSize:28,color:'var(--text)',marginBottom:8}}>Discover creators</div>
            <div style={{fontSize:14,maxWidth:400,margin:'0 auto',lineHeight:1.6,color:'var(--text-secondary)'}}>Search naturally — "find doctors who talk about heart health on TikTok" — and AI will find, score, and generate outreach strategies.</div>
          </div>}
        </div>
      </div>;
    }

    // ─── LIST ITEM ───
    function ListItem({creator, isDuplicate, onSelect, isDiscoveryResult, onSaveAndEnrich}) {
      const c = creator;
      const ai = c.ai_analysis||{};
      const creds = ai.credentials||[];
      const platforms=[];
      if (c.tiktok_handle) platforms.push({n:'tiktok',h:c.tiktok_handle,f:c.tiktok_followers});
      if (c.instagram_handle) platforms.push({n:'instagram',h:c.instagram_handle,f:c.instagram_followers});
      if (c.youtube_handle) platforms.push({n:'youtube',h:c.youtube_handle,f:c.youtube_subscribers});
      if (platforms.length===0&&c.handle) platforms.push({n:c.platform||'unknown',h:c.handle,f:c.followers});

      const listAi = c.ai_analysis||{};
      return <div className="card-warm" style={{display:'flex',alignItems:'center',gap:14,padding:'12px 16px',cursor:'pointer',opacity:isDuplicate?0.5:1}} onClick={()=>onSelect&&onSelect(c)}>
        <Avatar name={c.name} size={40} src={listAi.avatar_url || listAi.apify_profile?.avatar_url}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:2}}>
            <span style={{fontWeight:600,fontSize:14}}>{c.name}</span>
            {isDuplicate&&<Pill color="var(--amber)" bg="var(--amber-light)" style={{fontSize:9}}>In DB</Pill>}
            {creds.slice(0,1).map((cr,i)=><Pill key={i} color="var(--blue)" bg="var(--blue-light)" style={{fontSize:9}}>{cr}</Pill>)}
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8,fontSize:11,color:'var(--text-muted)'}}>
            {platforms.map((p,i)=><PlatformPill key={i} platform={p.n} handle={p.h}/>)}
            {c.categories?.slice(0,2).map(cat=><span key={cat} style={{fontFamily:'var(--font-mono)'}}>{cat}</span>)}
          </div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:12,flexShrink:0}}>
          {platforms[0]?.f&&<div style={{textAlign:'center'}}><div style={{fontSize:13,fontWeight:700}}>{fmtNum(platforms[0].f)}</div><div style={{fontSize:9,color:'var(--text-muted)'}}>followers</div></div>}
          {c.relevance_score!=null&&<ScoreRing score={c.relevance_score} size={36}/>}
        </div>
      </div>;
    }

    // ─── DATABASE TAB ───
    function DatabaseTab() {
      const {setSelected} = useContext(DetailCtx);
      const [creators,setCreators]=useState([]); const [total,setTotal]=useState(0); const [loading,setLoading]=useState(true);
      const [search,setSearch]=useState(''); const [filters,setFilters]=useState({}); const [page,setPage]=useState(1);
      const [viewMode,setViewMode]=useState('grid');

      const load=useCallback(async()=>{ setLoading(true); try { const d=await api('/creators',{params:{search:search||undefined,page,per_page:24,sort_by:'created_at',sort_dir:'desc',...filters}}); setCreators(d.creators||[]); setTotal(d.total||0); }catch(e){} setLoading(false); },[search,page,filters]);
      useEffect(()=>{load();},[load]);
      const handleEnrich=async(id)=>{ await api(`/creators/${id}/enrich`,{method:'POST'}); return id; };

      return <div>
        {/* Hero */}
        <div style={{background:'linear-gradient(135deg, var(--sage-light) 0%, var(--cream) 50%, var(--terracotta-light) 100%)',padding:'40px 0 32px'}}>
          <div style={{maxWidth:1200,margin:'0 auto',padding:'0 24px'}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}>{I.database(16)}<span style={{fontSize:13,fontWeight:600,color:'var(--sage)'}}>Creator Database</span></div>
            <h1 style={{fontFamily:'var(--font-display)',fontSize:36,color:'var(--text)',marginBottom:4}}>Your Creators</h1>
            <div style={{display:'flex',alignItems:'center',gap:12}}>
              <p style={{color:'var(--text-secondary)',fontSize:14}}>{total} creators in your database</p>
              <button className="btn-ghost" onClick={async()=>{if(!confirm('Delete all discovered/test creators?'))return;await api('/creators/bulk/discovered',{method:'DELETE'});load();}} style={{fontSize:11,padding:'4px 10px',color:'var(--red)'}}>Clear test data</button>
            </div>
          </div>
        </div>

        {/* Toolbar */}
        <div style={{position:'sticky',top:64,zIndex:30,background:'rgba(250,248,245,0.85)',backdropFilter:'blur(12px)',borderBottom:'1px solid var(--border)'}}>
          <div style={{maxWidth:1200,margin:'0 auto',padding:'0 24px',display:'flex',alignItems:'center',justifyContent:'space-between',height:48,gap:12}}>
            <div style={{display:'flex',alignItems:'center',gap:8,flex:1}}>
              <div style={{position:'relative',maxWidth:260,flex:1}}>
                <span style={{position:'absolute',left:10,top:'50%',transform:'translateY(-50%)',color:'var(--text-muted)'}}>{I.search(14)}</span>
                <input value={search} onChange={e=>{setSearch(e.target.value);setPage(1);}} placeholder="Search creators..."
                  style={{width:'100%',padding:'7px 10px 7px 32px',border:'1px solid var(--border)',borderRadius:'var(--radius-xs)',fontSize:13,background:'var(--bg-card)',color:'var(--text)',outline:'none',fontFamily:'var(--font-body)'}}/>
              </div>
              <select onChange={e=>{setFilters(f=>({...f,pipeline_stage:e.target.value||undefined}));setPage(1);}} style={{padding:'7px 10px',border:'1px solid var(--border)',borderRadius:'var(--radius-xs)',fontSize:12,background:'var(--bg-card)',color:'var(--text-secondary)',cursor:'pointer'}}>
                <option value="">All Stages</option><option value="discovered">Discovered</option><option value="contacted">Contacted</option><option value="negotiating">Negotiating</option><option value="contracted">Contracted</option><option value="active">Active</option>
              </select>
              <select onChange={e=>{setFilters(f=>({...f,quality_tier:e.target.value||undefined}));setPage(1);}} style={{padding:'7px 10px',border:'1px solid var(--border)',borderRadius:'var(--radius-xs)',fontSize:12,background:'var(--bg-card)',color:'var(--text-secondary)',cursor:'pointer'}}>
                <option value="">All Tiers</option><option value="A+">A+</option><option value="A">A</option><option value="B">B</option><option value="C">C</option>
              </select>
              <select onChange={e=>{setFilters(f=>({...f,categories:e.target.value||undefined}));setPage(1);}} style={{padding:'7px 10px',border:'1px solid var(--border)',borderRadius:'var(--radius-xs)',fontSize:12,background:'var(--bg-card)',color:'var(--text-secondary)',cursor:'pointer'}}>
                <option value="">All Categories</option>
                {CREATOR_TYPES.map(t=><option key={t} value={t}>{t}</option>)}
              </select>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:4,background:'var(--bg-muted)',borderRadius:'var(--radius-xs)',padding:3}}>
              <button onClick={()=>setViewMode('grid')} style={{padding:6,borderRadius:4,border:'none',cursor:'pointer',background:viewMode==='grid'?'var(--bg-card)':'transparent',color:viewMode==='grid'?'var(--text)':'var(--text-muted)',display:'flex',boxShadow:viewMode==='grid'?'var(--shadow-sm)':'none'}}>{I.grid()}</button>
              <button onClick={()=>setViewMode('list')} style={{padding:6,borderRadius:4,border:'none',cursor:'pointer',background:viewMode==='list'?'var(--bg-card)':'transparent',color:viewMode==='list'?'var(--text)':'var(--text-muted)',display:'flex',boxShadow:viewMode==='list'?'var(--shadow-sm)':'none'}}>{I.list()}</button>
            </div>
          </div>
        </div>

        <div style={{maxWidth:1200,margin:'0 auto',padding:'24px 24px 40px'}}>
          {loading?<div style={{textAlign:'center',padding:60,color:'var(--text-muted)'}}>{I.loader(20)} Loading...</div>
          :creators.length===0?<div style={{textAlign:'center',padding:60,color:'var(--text-muted)',fontSize:14}}>No creators found. Try adjusting filters or import data.</div>
          :viewMode==='grid'?
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:16}}>
              {creators.map((c,i)=><CreatorCard key={c.id} creator={c} onEnrich={handleEnrich} onSelect={setSelected} delay={i}/>)}
            </div>
          :
            <div style={{display:'flex',flexDirection:'column',gap:6}}>
              {creators.map(c=><ListItem key={c.id} creator={c} onSelect={setSelected}/>)}
            </div>
          }
          {total>24&&<div style={{display:'flex',justifyContent:'center',gap:8,marginTop:24}}>
            <button disabled={page<=1} className="btn-ghost" onClick={()=>setPage(p=>p-1)} style={{opacity:page<=1?0.4:1}}>Previous</button>
            <span style={{padding:'6px 12px',fontSize:12,fontFamily:'var(--font-mono)',color:'var(--text-muted)'}}>Page {page} of {Math.ceil(total/24)}</span>
            <button disabled={page>=Math.ceil(total/24)} className="btn-ghost" onClick={()=>setPage(p=>p+1)} style={{opacity:page>=Math.ceil(total/24)?0.4:1}}>Next</button>
          </div>}
        </div>
      </div>;
    }

    // ─── IMPORT TAB ───
    function ImportTab() {
      const [dragging,setDragging]=useState(false); const [uploading,setUploading]=useState(false);
      const [result,setResult]=useState(null); const [error,setError]=useState(null); const fileRef=useRef(null);
      const doUpload=async(file)=>{ setUploading(true);setError(null);setResult(null); const fd=new FormData(); fd.append('file',file);
        try { const res=await fetch(`${API}/import`,{method:'POST',body:fd}); if(!res.ok){const err=await res.json().catch(()=>({}));throw new Error(err.detail||'Upload failed');} setResult(await res.json()); }catch(e){setError(e.message);} setUploading(false); };

      return <div style={{maxWidth:1200,margin:'0 auto',padding:'40px 24px'}}>
        <h1 style={{fontFamily:'var(--font-display)',fontSize:32,marginBottom:4}}>Import Creators</h1>
        <p style={{color:'var(--text-secondary)',fontSize:14,marginBottom:24}}>Upload your existing creator spreadsheet</p>
        <div onDragOver={e=>{e.preventDefault();setDragging(true);}} onDragLeave={()=>setDragging(false)} onDrop={e=>{e.preventDefault();setDragging(false);const f=e.dataTransfer?.files?.[0];if(f)doUpload(f);}} onClick={()=>fileRef.current?.click()}
          style={{border:`2px dashed ${dragging?'var(--terracotta)':'var(--border)'}`,borderRadius:'var(--radius)',padding:'60px 40px',textAlign:'center',cursor:'pointer',background:dragging?'var(--terracotta-light)':'var(--bg-card)',transition:'all 0.2s'}}>
          <input ref={fileRef} type="file" accept=".csv,.xlsx,.xls" style={{display:'none'}} onChange={e=>e.target.files?.[0]&&doUpload(e.target.files[0])}/>
          <div style={{marginBottom:12,color:'var(--text-muted)'}}>{I.upload(40)}</div>
          {uploading?<div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,color:'var(--terracotta)'}}>{I.loader()} Importing...</div>
          :<><div style={{fontSize:15,fontWeight:500,color:'var(--text-secondary)',marginBottom:4}}>Drop a CSV or Excel file here</div>
            <div style={{fontSize:12,color:'var(--text-muted)'}}>Supports the 37-column Luma creator spreadsheet</div></>}
        </div>
        {error&&<div style={{marginTop:16,padding:'12px 16px',background:'var(--red-light)',borderRadius:'var(--radius-xs)',color:'var(--red)',fontSize:13}}>{error}</div>}
        {result&&<div className="fade-up" style={{marginTop:20,padding:'16px 20px',background:'var(--sage-light)',borderRadius:'var(--radius)',border:'1px solid var(--sage)'}}>
          <div style={{fontSize:14,fontWeight:600,color:'var(--sage)',marginBottom:8,display:'flex',alignItems:'center',gap:6}}>{I.check()} Import Complete</div>
          <div style={{display:'flex',gap:20,fontSize:13,color:'var(--text-secondary)'}}><span><strong>{result.imported}</strong> imported</span><span><strong>{result.duplicates_skipped}</strong> skipped</span>{result.errors?.length>0&&<span style={{color:'var(--red)'}}><strong>{result.errors.length}</strong> errors</span>}</div>
        </div>}
      </div>;
    }

    // ─── MAIN APP ───
    function App() {
      const [tab,setTab]=useState('discover');
      const [stats,setStats]=useState(null);
      const [selected,setSelected]=useState(null);
      useEffect(()=>{api('/stats').then(setStats).catch(()=>{});},[tab]);

      const tabs=[{id:'discover',label:'Discover',icon:I.search},{id:'database',label:'Database',icon:I.users},{id:'import',label:'Import',icon:I.upload}];

      return <DetailCtx.Provider value={{selected,setSelected}}>
        <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
          {/* Top nav */}
          <header style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'0 24px',height:64,borderBottom:'1px solid var(--border)',background:'rgba(250,248,245,0.85)',backdropFilter:'blur(12px)',position:'sticky',top:0,zIndex:50}}>
            <div style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer'}} onClick={()=>setTab('discover')}>
              <div style={{width:34,height:34,borderRadius:10,background:'var(--terracotta)',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',boxShadow:'0 2px 8px rgba(196,93,62,0.3)'}}>{I.sparkles(18)}</div>
              <span style={{fontFamily:'var(--font-display)',fontSize:22,color:'var(--text)'}}>Creator Engine</span>
            </div>
            <nav style={{display:'flex',alignItems:'center',gap:2}}>
              {tabs.map(t=>{
                const active=tab===t.id;
                return <button key={t.id} onClick={()=>setTab(t.id)} style={{
                  display:'flex',alignItems:'center',gap:6,padding:'8px 16px',border:'none',background:'transparent',cursor:'pointer',
                  fontSize:13,fontWeight:active?600:400,color:active?'var(--text)':'var(--text-muted)',
                  borderRadius:10,position:'relative',transition:'all 0.15s',fontFamily:'var(--font-body)',
                }}>
                  <span style={{color:active?'var(--terracotta)':'var(--text-muted)',transition:'color 0.15s'}}>{t.icon()}</span>
                  {t.label}
                  {active&&<div style={{position:'absolute',bottom:0,left:8,right:8,height:2,background:'var(--terracotta)',borderRadius:1}}/>}
                </button>;
              })}
            </nav>
          </header>

          <main style={{flex:1}}>
            {tab==='discover'&&<DiscoverTab/>}
            {tab==='database'&&<DatabaseTab/>}
            {tab==='import'&&<ImportTab/>}
          </main>

          <footer style={{padding:'12px 24px',borderTop:'1px solid var(--border)',fontSize:11,color:'var(--text-muted)',textAlign:'center',fontFamily:'var(--font-mono)'}}>
            Creator Engine v2.0 · Luma Nutrition · <a href="https://creator-engine-production.up.railway.app/docs" target="_blank" rel="noopener" style={{color:'var(--terracotta)',textDecoration:'none'}}>API Docs</a>
          </footer>
        </div>

        <DetailPanel/>
      </DetailCtx.Provider>;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
